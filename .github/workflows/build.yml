name: Build ArtisanKRNL

on:
  workflow_dispatch:
    inputs:
      ksu_branch:
        description: 'KernelSU version'
        required: true
        default: 'legacy_susfs'
        type: choice
        options:
          - 'legacy_susfs'
          - 'legacy_susfs-v2'

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        device: [d1, d1xks, d2x, d2s, d2xks]

    steps:
      - name: Cleanup workspace
        run: |
          sudo rm -rf "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"

      - name: Checkout source
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup build environment
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            p7zip-full jq attr ccache clang ffmpeg golang \
            libbrotli-dev libgtest-dev libprotobuf-dev libunwind-dev libpcre2-dev \
            libzstd-dev linux-modules-extra-$(uname -r) lld protobuf-compiler webp \
            curl xxd patchelf flex bison libarchive-tools build-essential pcre2-utils \
            git-core zip zlib1g-dev libc6-dev-i386 lib32z1-dev
          
          sudo modprobe erofs f2fs 2>/dev/null || true
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo apt clean
          docker system prune -af --volumes 2>/dev/null || true

      - name: Setup KernelSU
        run: |
          rm -rf ./KernelSU-Next ./drivers/KernelSU-Next ./drivers/kernelsu
          
          sed -i '/KernelSU-Next/d' drivers/Makefile 2>/dev/null || true
          sed -i '/kernelsu/d' drivers/Makefile 2>/dev/null || true
          sed -i '/KernelSU-Next/d' drivers/Kconfig 2>/dev/null || true
          sed -i '/kernelsu/d' drivers/Kconfig 2>/dev/null || true
          
          if [ "${{ github.event.inputs.ksu_branch }}" = "legacy_susfs" ]; then
            echo "Installing KernelSU-Next (legacy_susfs branch)..."
            curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy_susfs
          else
            echo "Installing KernelSU-Next (legacy_susfs-v2 branch) manually..."
            
            git clone https://github.com/sidex15/KernelSU-Next.git
            cd KernelSU-Next
            git fetch --all
            git checkout origin/legacy-susfs-v2
            cd ..
            
            echo "=== Debug: KernelSU-Next directory structure ==="
            ls -la KernelSU-Next/
            echo ""
            echo "=== Finding Kconfig files ==="
            find ./KernelSU-Next -name "Kconfig"
            echo ""
            
            # Create drivers/KernelSU-Next as a symlink to the actual kernel directory
            rm -rf ./drivers/KernelSU-Next
            ln -sf "$(pwd)/KernelSU-Next/kernel" "$(pwd)/drivers/KernelSU-Next"
            
            echo "=== drivers/KernelSU-Next contents ==="
            ls -la drivers/KernelSU-Next/ || echo "Link broken!"
            
            if ! grep -q "KernelSU-Next" drivers/Makefile; then
              echo "obj-y += KernelSU-Next/" >> drivers/Makefile
            fi
            
            if ! grep -q "KernelSU-Next/Kconfig" drivers/Kconfig; then
              echo 'source "drivers/KernelSU-Next/Kconfig"' >> drivers/Kconfig
            fi
          fi

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build kernel
        run: ./build.sh -m ${{ matrix.device }} -k y -r n

      - name: Prepare artifacts
        run: |
          ARTIFACT_DIR="${{ github.workspace }}/build/out/zip_files"
          mkdir -p "$ARTIFACT_DIR"
          find "${{ github.workspace }}/build/out/" -type f -name "*.zip" -exec cp {} "$ARTIFACT_DIR/" \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: "ArtisanKRNL-${{ github.event.inputs.ksu_branch }}-${{ matrix.device }}"
          path: ${{ github.workspace }}/build/out/zip_files/
          if-no-files-found: warn
          retention-days: 90
