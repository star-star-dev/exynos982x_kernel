name: Update KernelSU-Next Pointers

on:
  workflow_dispatch: # Allows you to trigger this workflow manually from the GitHub UI

jobs:
  update-ksu:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history and submodules so we can update the pointers
          submodules: 'recursive'
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Update KernelSU-Next pointers
        run: |
          KSU_REPO="https://github.com/Devandroid-bit/KernelSU-Next.git"
          KSU_HASH="9b08e88862000d5c50fb2e43a5b75123cf472e54"
          
          echo "=> Updating KernelSU-Next paths to commit $KSU_HASH"
          
          # ---------------------------------------------------------
          # Path 1: KernelSU-Next
          # ---------------------------------------------------------
          if [ -d "KernelSU-Next" ]; then
            cd KernelSU-Next
            git remote add ksu_next $KSU_REPO || true
            git fetch ksu_next $KSU_HASH
            git checkout FETCH_HEAD
            cd ..
          else
            echo "Error: Directory KernelSU-Next not found!"
            exit 1
          fi
          
          # ---------------------------------------------------------
          # Path 2: drivers/kernelsu
          # ---------------------------------------------------------
          if [ -d "drivers/kernelsu" ]; then
            cd drivers/kernelsu
            git remote add ksu_next $KSU_REPO || true
            git fetch ksu_next $KSU_HASH
            git checkout FETCH_HEAD
            # Return to root (drivers/kernelsu is 2 levels deep)
            cd ../..
          else
            echo "Error: Directory drivers/kernelsu not found!"
            exit 1
          fi
          
      - name: Commit and push changes
        run: |
          # Set up git config for the bot to commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the updated submodule pointers
          git add KernelSU-Next drivers/kernelsu
          
          # Check if there are actually any changes to commit to avoid workflow failure
          if ! git diff --cached --quiet; then
            echo "Changes detected, committing..."
            git commit -m "chore: update KernelSU-Next pointers to 9b08e88862"
            git push
          else
            echo "No changes detected. Pointers are already at $KSU_HASH."
          fi

